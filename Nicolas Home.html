<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Nicolas — Agent Market</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --ink: #0E0B14;
    --ink-2: #15121C;
    --ink-3: #1F1B2A;
    --line: rgba(245, 239, 224, 0.10);
    --line-strong: rgba(245, 239, 224, 0.18);
    --parchment: #F5EFE0;
    --paper: #EFE7D2;
    --paper-2: #E4DABF;
    --muted: rgba(245, 239, 224, 0.62);
    --muted-strong: rgba(245, 239, 224, 0.82);
    --gold: oklch(0.80 0.13 82);
    --gold-soft: oklch(0.86 0.08 82);
    --gold-deep: oklch(0.62 0.13 70);
    --ember: oklch(0.66 0.19 30);
    --jade: oklch(0.66 0.10 165);
    --violet: oklch(0.65 0.13 295);
    --radius: 14px;
    --radius-lg: 22px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--ink); color: var(--parchment); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  #app { min-height: 100vh; }

  /* Subtle parchment grain on dark */
  .grain::before {
    content:"";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(245,239,224,.04) 50%, transparent 51%),
      radial-gradient(1px 1px at 70% 80%, rgba(245,239,224,.04) 50%, transparent 51%),
      radial-gradient(1px 1px at 40% 60%, rgba(245,239,224,.03) 50%, transparent 51%);
    background-size: 7px 7px, 11px 11px, 13px 13px;
    pointer-events: none;
    opacity: .8;
  }

  .display { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 500; letter-spacing: -0.02em; font-feature-settings: "ss01", "ss02"; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  ::selection { background: var(--gold); color: var(--ink); }

  /* Hairline button reset */
  button { font-family: inherit; cursor: pointer; border: none; background: transparent; color: inherit; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(245,239,224,.10); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(245,239,224,.18); }

  /* Marquee */
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .marquee-track { animation: marquee 60s linear infinite; }

  @keyframes spin-slow { to { transform: rotate(360deg); } }
  .spin-slow { animation: spin-slow 90s linear infinite; transform-origin: center; }
  @keyframes spin-rev { to { transform: rotate(-360deg); } }
  .spin-rev { animation: spin-rev 140s linear infinite; transform-origin: center; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: .35; }
  }
  .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

  @keyframes flame {
    0%, 100% { transform: translateY(0) scaleY(1); opacity: .9; }
    50% { transform: translateY(-2px) scaleY(1.05); opacity: 1; }
  }
  .flame { animation: flame 2.4s ease-in-out infinite; transform-origin: center bottom; }
</style>
</head>
<body>
<div id="app"></div>

<!-- Tweaks scaffold -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="parts.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>

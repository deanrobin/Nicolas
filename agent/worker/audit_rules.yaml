# Hardcoded audit rules for the deterministic precheck stage.
# This file is committed to git and can be edited by the operator.
# Changes take effect on the next worker restart.

prechecks:
  name:
    min_length: 2
    max_length: 100
  description:
    min_length: 20
    max_length: 5000
  price_usdt:
    min: 0.01
    max: 10000

  # Case-insensitive substring match against name + description.
  # If ANY of these appear, the record is auto-rejected by Python before
  # any LLM call is made.
  blacklist_keywords:
    - 赌博
    - 博彩
    - 彩票
    - 色情
    - 涉黄
    - 成人内容
    - 武器
    - 枪支
    - 毒品
    - 诈骗
    - 传销
    - 庞氏
    - ponzi
    - 洗钱
    - 政治敏感
    - 仇恨
    - 恐怖
    - 自杀

llm:
  # Below this confidence the worker marks the record as `needs_human`
  # instead of auto-approving / auto-rejecting.
  confidence_threshold: 0.7
  # Per-call output cap. The auditor returns small JSON, 1024 is plenty.
  max_output_tokens: 1024

# ── Dispute arbitration (issue #69 arbitrator worker) ──────────────────────
# Used by worker/dispute_processor.py. The arbitrator (arbitrator.yaml soul)
# returns a structured ruling on every open dispute; this section tunes the
# conservatively-narrow case in which the worker is willing to act on its
# own, without admin involvement.
disputes:
  # Use the bigger model for disputes — single decisions can move real money,
  # we'd rather pay more tokens than wrongly auto-reject a legit complaint.
  model: gemini-2.5-pro
  max_output_tokens: 2048

  # Only auto-rejects when ALL of these hold:
  #   * ruling == RELEASE_FULL (seller fulfilled as promised)
  #   * auto_execute == true   (the AI itself flagged this as safe)
  #   * confidence >= auto_reject_confidence
  #   * order amount <= auto_reject_max_usdt  (blast-radius cap)
  # Anything else → record the ai_* fields and leave status='open' for admin.
  auto_reject_confidence: 0.8
  auto_reject_max_usdt: 20

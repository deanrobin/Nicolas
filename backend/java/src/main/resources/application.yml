spring:
  application:
    name: nicolas

  # ── 数据库 ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:nicolas}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000        # 5 min
      connection-timeout: 30000   # 30 s
      max-lifetime: 1800000       # 30 min
      pool-name: NicolasPool

  # ── JPA ───────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect
      hibernate.jdbc.batch_size: 20
      hibernate.order_inserts: true
      hibernate.order_updates: true

  # ── 邮件 ──────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── 定时任务线程池 ────────────────────────────────────────────────────────
  task:
    scheduling:
      pool:
        size: 10
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 200

  # ── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # ── 文件上传限制 ──────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    accept-count: 100
    connection-timeout: 20000
  error:
    include-message: always
    include-binding-errors: always

# ── Python 后端 ────────────────────────────────────────────────────────────
python:
  backend:
    url: ${PYTHON_BACKEND_URL:http://localhost:8000}

# ── JWT ───────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:nicolas-default-secret-change-in-production-256bit}
  expiration-days: ${JWT_EXPIRATION_DAYS:7}

# ── 应用配置 ──────────────────────────────────────────────────────────────
app:
  mail:
    from: ${MAIL_FROM:noreply@nicolas.xyz}
    dev-mode: ${MAIL_DEV_MODE:true}

# ── 链上配置（仅 XLayer） ─────────────────────────────────────────────────
chain:
  xlayer:
    rpc-url: ${XLAYER_RPC_URL:https://rpc.xlayer.tech}
    chain-id: ${XLAYER_CHAIN_ID:196}
    usdt-address: ${XLAYER_USDT_ADDRESS:0x1E4a5963aBFD975d8c9021ce480b42188849D41d}
  escrow:
    address: ${ESCROW_CONTRACT_ADDRESS:}
  operator:
    address: ${OPERATOR_ADDRESS:}
    private-key: ${OPERATOR_PRIVATE_KEY:}

# ── OnchainOS（广播 / 查询交易）────────────────────────────────────────────
onchainos:
  base-url: ${ONCHAINOS_BASE_URL:https://www.okx.com/api/v5/wallet}
  api-key: ${ONCHAINOS_API_KEY:}
  api-secret: ${ONCHAINOS_API_SECRET:}
  passphrase: ${ONCHAINOS_PASSPHRASE:}
  project-id: ${ONCHAINOS_PROJECT_ID:}

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false   # dev 模式下不检查 SMTP，避免 BadCredentials 误报
  info:
    env:
      enabled: true

info:
  app:
    name: Nicolas
    version: 0.1.0

# ── 日志 ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.nicolas: DEBUG
  file:
    name: ${LOG_PATH:logs}/nicolas.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      file-name-pattern: ${LOG_PATH:logs}/nicolas.%d{yyyy-MM-dd}.%i.log

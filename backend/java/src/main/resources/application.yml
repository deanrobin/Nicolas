spring:
  application:
    name: nicolas

  # ── 数据库 ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:nicolas}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000        # 5 min
      connection-timeout: 30000   # 30 s
      max-lifetime: 1800000       # 30 min
      pool-name: NicolasPool

  # ── JPA ───────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect
      hibernate.jdbc.batch_size: 20
      hibernate.order_inserts: true
      hibernate.order_updates: true

  # ── 邮件 ──────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── 定时任务线程池 ────────────────────────────────────────────────────────
  task:
    scheduling:
      pool:
        size: 10
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 200

  # ── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  # ── 文件上传限制 ──────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 52MB
      max-request-size: 55MB

# ── Skill 文件存储 ────────────────────────────────────────────────────────
skill:
  upload-dir: ${SKILL_UPLOAD_DIR:uploads/skills}

# ── 支付与放款（V1 平台钱包托管 + V2 x402/OKX Facilitator） + 内容审核规则 ────
# fee-bps: BPS 模式下的抽水费率，10000 = 100% （0 = 不抽水）
# fee-mode: BPS（按比例，平台赚钱） | FIXED（固定金额，仅覆盖 gas）
# fee-fixed-usdt: FIXED 模式下每笔订单的固定抽成金额（USDT）
# holdback-hours: V1 manual-pay 兼容字段；V2 周结算优先用 settlement.* cron
# settlement.cutoff-cron: 每周把"已支付+无纠纷"订单推进 settle_pending 的时刻（默认周五 12:00）
# settlement.payout-cron: 周日批量放款的起始时刻（默认 12:00），后续 payout-window-hours 内错峰发出
# settlement.payout-window-hours: 放款错峰窗口长度（小时），结合 payout-cron 决定结算"慢节奏"
# x402.enabled: 开关；true 时 buy 响应里附带 x402 challenge
# x402.facilitator-base-url: OKX Facilitator 根地址（与 onchainos.base-url 不同）
# x402.token-address / token-name / token-version: EIP-3009 token 三件套（XLayer USD₮0）
# x402.network: CAIP-2 网络 ID（XLayer = eip155:196）
# x402.post-settle-confirm-sleep-ms: OKX /settle 返回后我们自己再 RPC 校验 receipt 前的等待时间
# audit.* 与 agent/worker/audit_rules.yaml 保持一致：改这里 = 改 Python worker，
# 两边的阈值与黑名单必须同步。Java 端在请求入口拒掉违规内容；worker 兜底再扫一遍 DB。
nicolas:
  payment:
    fee-bps: ${PAYMENT_FEE_BPS:0}
    fee-mode: ${PAYMENT_FEE_MODE:BPS}
    fee-fixed-usdt: ${PAYMENT_FEE_FIXED_USDT:0}
    holdback-hours: ${PAYMENT_HOLDBACK_HOURS:24}
    usdt-decimals: ${USDT_DECIMALS:6}
    payout-enabled: ${PAYOUT_JOB_ENABLED:true}
    confirmation-blocks: ${PAYMENT_CONFIRMATION_BLOCKS:3}
    settlement:
      # Spring @Scheduled cron — 6-field "sec min hr dom mon dow". No Quartz '?'.
      cutoff-cron: ${SETTLEMENT_CUTOFF_CRON:0 0 12 * * FRI}
      payout-cron: ${SETTLEMENT_PAYOUT_CRON:0 0 12 * * SUN}
      payout-window-hours: ${SETTLEMENT_PAYOUT_WINDOW_HOURS:8}
    x402:
      enabled: ${X402_ENABLED:true}
      facilitator-base-url: ${OKX_X402_FACILITATOR_URL:https://web3.okx.com}
      token-address: ${X402_TOKEN_ADDRESS:0x779ded0c9e1022225f8e0630b35a9b54be713736}
      token-name: ${X402_TOKEN_NAME:USD₮0}
      token-version: ${X402_TOKEN_VERSION:1}
      network: ${X402_NETWORK:eip155:196}
      version: ${X402_VERSION:2}
      max-timeout-seconds: ${X402_MAX_TIMEOUT_SECONDS:600}
      sync-settle: ${X402_SYNC_SETTLE:true}
      post-settle-confirm-sleep-ms: ${X402_POST_SETTLE_SLEEP_MS:1000}
  audit:
    name:
      min-length: 2
      max-length: 100
    description:
      min-length: 20
      max-length: 5000
    price:
      min: 0.01
      max: 10000
    blacklist-keywords:
      - 赌博
      - 博彩
      - 彩票
      - 色情
      - 涉黄
      - 成人内容
      - 武器
      - 枪支
      - 毒品
      - 诈骗
      - 传销
      - 庞氏
      - ponzi
      - 洗钱
      - 政治敏感
      - 仇恨
      - 恐怖
      - 自杀

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    accept-count: 100
    connection-timeout: 20000
  error:
    include-message: always
    include-binding-errors: always

# ── Python 后端 ────────────────────────────────────────────────────────────
python:
  backend:
    url: ${PYTHON_BACKEND_URL:http://localhost:8000}

# ── JWT ───────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:nicolas-default-secret-change-in-production-256bit}
  expiration-days: ${JWT_EXPIRATION_DAYS:7}

# ── 应用配置 ──────────────────────────────────────────────────────────────
app:
  mail:
    from: ${MAIL_FROM:noreply@nicolas.xyz}
    dev-mode: ${MAIL_DEV_MODE:true}

# ── 链上配置（仅 XLayer） ─────────────────────────────────────────────────
chain:
  xlayer:
    rpc-url: ${XLAYER_RPC_URL:https://rpc.xlayer.tech}
    chain-id: ${XLAYER_CHAIN_ID:196}
    usdt-address: ${XLAYER_USDT_ADDRESS:0x1E4a5963aBFD975d8c9021ce480b42188849D41d}
    # OKX Wallet's "USDT 免 gas" Send UI on XLayer routes through this paymaster-
    # backed wrapper contract (transferWithAuthorization / EIP-3009). The Transfer
    # log emits with this address as the source contract, so we accept it as a
    # valid USDT for incoming-payment recognition. Set empty to disable.
    usdt-gasfree-address: ${XLAYER_USDT_GASFREE_ADDRESS:0x779ded0c9e1022225f8e0630b35a9b54be713736}
  escrow:
    address: ${ESCROW_CONTRACT_ADDRESS:}
  operator:
    address: ${OPERATOR_ADDRESS:}
    private-key: ${OPERATOR_PRIVATE_KEY:}

# ── OnchainOS（广播 / 查询交易；同账号同时给 x402 facilitator 提供 HMAC 凭证）─
# api-key / api-secret / passphrase 同时用于 OnchainOS 自身（broadcast / tx 查询）
# 以及 nicolas.payment.x402.facilitator-base-url 下的 /api/v6/pay/x402/* 调用。
# 想激活 x402，把以下三项填上即可：ONCHAINOS_API_KEY / _SECRET / _PASSPHRASE。
onchainos:
  base-url: ${ONCHAINOS_BASE_URL:https://www.okx.com/api/v5/wallet}
  api-key: ${ONCHAINOS_API_KEY:}
  api-secret: ${ONCHAINOS_API_SECRET:}
  passphrase: ${ONCHAINOS_PASSPHRASE:}
  project-id: ${ONCHAINOS_PROJECT_ID:}

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false   # dev 模式下不检查 SMTP，避免 BadCredentials 误报
  info:
    env:
      enabled: true

info:
  app:
    name: Nicolas
    version: 0.1.0

# ── 日志 ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.nicolas: DEBUG
  file:
    name: ${LOG_PATH:logs}/nicolas.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      file-name-pattern: ${LOG_PATH:logs}/nicolas.%d{yyyy-MM-dd}.%i.log

spring:
  application:
    name: nicolas-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/nicolas?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    time-zone: Asia/Shanghai

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

python:
  backend:
    url: ${PYTHON_BACKEND_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET:nicolas-default-secret-key-change-in-production-must-be-256bit}
  expiration-days: ${JWT_EXPIRATION_DAYS:7}

app:
  mail:
    from: ${MAIL_FROM:noreply@agents-bazaar.xyz}
    dev-mode: ${MAIL_DEV_MODE:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.nicolas: DEBUG
